# POC Pipeline: Trigger Fabric Deployment (simplified for testing)
# Uses az login device code flow or pre-authenticated agent
# Production version would use service principal via AzureCLI task

trigger: none  # Manual trigger for POC testing

pool:
  vmImage: 'windows-latest'

variables:
  - group: Fabric-Variables
  - name: fabricApiUrl
    value: 'https://api.fabric.microsoft.com/v1'

stages:
  - stage: DeployToTest
    displayName: 'Deploy Dev → Test'
    jobs:
      - deployment: FabricDeploy
        displayName: 'Trigger Fabric Deployment Pipeline'
        environment: 'Test'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: PowerShell@2
                  displayName: 'Install Az CLI and Login'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "Az CLI version:"
                      az version --query '"azure-cli"' -o tsv

                - task: PowerShell@2
                  displayName: 'Trigger Dev → Test Deployment'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "Triggering Fabric Deployment Pipeline..."
                      Write-Host "Pipeline ID: $(FABRIC_PIPELINE_ID)"
                      Write-Host "Source Stage (Dev): $(DEV_STAGE_ID)"
                      Write-Host "Target Stage (Test): $(TEST_STAGE_ID)"
                      
                      # In production, this would use a service principal token
                      # For POC, we demonstrate the API call structure
                      Write-Host ""
                      Write-Host "API Call that would execute:"
                      Write-Host "POST $(fabricApiUrl)/deploymentPipelines/$(FABRIC_PIPELINE_ID)/deploy"
                      Write-Host "Body: {sourceStageId: $(DEV_STAGE_ID), targetStageId: $(TEST_STAGE_ID)}"
                      Write-Host ""
                      Write-Host "Deployment would be triggered here with service principal auth"
                      Write-Host "POC validated this API call works (tested manually)"
